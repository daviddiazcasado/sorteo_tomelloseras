<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✈️ ¡Nuestro Viaje de Chicas! - Septiembre 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-light: #F0F4F8;
    --accent-blue: #0077B6;
    --accent-teal: #48CAE4;
    --coral: #FF7043;
    --sand: #F4E1D2;
    --text-dark: #2D3436;
    --text-mid: #636E72;
    --white: #FFFFFF;
    --shadow: rgba(0, 119, 182, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg-light);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Fondo decorativo (Efecto cielo/viaje) */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(circle at 10% 10%, rgba(72, 202, 228, 0.15) 0%, transparent 40%),
      radial-gradient(circle at 90% 90%, rgba(255, 112, 67, 0.1) 0%, transparent 40%);
    z-index: -1;
  }

  /* Aviones de papel flotando */
  .floating-icons {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .plane-icon {
    position: absolute;
    opacity: 0.2;
    font-size: 1.5rem;
    animation: drift linear infinite;
  }

  @keyframes drift {
    from { transform: translate(-10vw, 110vh) rotate(45deg); }
    to { transform: translate(110vw, -10vh) rotate(45deg); }
  }

  /* Contenedor principal */
  .container {
    position: relative;
    z-index: 10;
    width: min(440px, 92vw);
    text-align: center;
  }

  /* Header */
  .header {
    margin-bottom: 28px;
    animation: fadeDown 0.8s ease both;
  }

  .header .eyebrow {
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent-blue);
    margin-bottom: 8px;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    color: var(--text-dark);
    line-height: 1.2;
  }

  .header h1 span {
    color: var(--coral);
    font-style: italic;
  }

  /* Tarjeta principal */
  .card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-radius: 32px;
    padding: 40px 28px;
    box-shadow: 0 15px 35px var(--shadow);
    border: 1px solid rgba(255, 255, 255, 0.8);
    animation: fadeUp 0.8s ease 0.2s both;
  }

  /* Icono Avión */
  .icon-wrap {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-teal));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 2.5rem;
    color: white;
    box-shadow: 0 8px 20px rgba(0, 119, 182, 0.3);
  }

  /* Chips de Destino */
  .destinations-hint {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 30px;
  }

  .dest-chip {
    background: var(--bg-light);
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 0.75rem;
    color: var(--text-mid);
    border: 1px solid #E2E8F0;
    transition: all 0.3s ease;
  }

  .dest-chip.highlight {
    background: var(--accent-blue);
    color: white;
    transform: scale(1.1);
    border-color: var(--accent-blue);
  }

  /* Botón */
  .btn-sorteo {
    width: 100%;
    padding: 20px;
    background: var(--text-dark);
    color: white;
    border: none;
    border-radius: 18px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 8px 15px rgba(0,0,0,0.1);
  }

  .btn-sorteo:hover {
    background: var(--accent-blue);
    transform: translateY(-2px);
  }

  /* Countdown */
  .countdown-wrap {
    display: none;
    flex-direction: column;
    gap: 15px;
  }

  .countdown-wrap.active { display: flex; }

  .countdown-num {
    font-size: 4rem;
    font-family: 'Playfair Display', serif;
    color: var(--accent-blue);
    font-weight: 700;
  }

  .progress-bar {
    width: 100%;
    height: 6px;
    background: #E2E8F0;
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent-teal);
    width: 100%;
    transition: width 1s linear;
  }

  /* Resultado */
  .result-wrap {
    display: none;
    animation: revealResult 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67) both;
  }

  .result-wrap.active { display: block; }

  .city-image {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 20px;
    margin-bottom: 15px;
  }

  .city-name {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    color: var(--text-dark);
    margin-bottom: 10px;
  }

  .city-desc {
    font-size: 0.9rem;
    color: var(--text-mid);
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .btn-repeat {
    background: none;
    border: 2px solid var(--accent-blue);
    color: var(--accent-blue);
    padding: 12px 25px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.8rem;
  }

  .btn-repeat:hover {
    background: var(--accent-blue);
    color: white;
  }

  /* Animaciones */
  @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes revealResult { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

</style>
</head>
<body>

<div class="floating-icons" id="planes"></div>

<div class="container">
  <div class="header">
    <div class="eyebrow">📍 Septiembre 2026</div>
    <h1>¿A dónde nos vamos <span>chicas</span>?</h1>
  </div>

  <div class="card">
    <div class="icon-wrap">✈️</div>

    <div class="destinations-hint" id="chipsContainer">
      </div>

    <button class="btn-sorteo" id="btnSorteo" onclick="startCountdown()">
      🌏 Reservar Destino al Azar
    </button>

    <div class="countdown-wrap" id="countdownWrap">
      <div style="font-size: 0.8rem; color: var(--text-mid);">BUSCANDO VUELOS...</div>
      <div class="countdown-num" id="countdownNum">5</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="result-wrap" id="resultWrap">
      <img class="city-image" id="cityImg" src="" alt="">
      <div id="cityFlag" style="font-size: 2rem;"></div>
      <div class="city-name" id="cityName"></div>
      <div class="city-desc" id="cityDesc"></div>
      <button class="btn-repeat" onclick="reset()">↻ Probar otra vez</button>
    </div>
  </div>
</div>

<script>
const destinations = [
  { name: "Londres", flag: "🇬🇧", image: "https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?auto=format&fit=crop&w=800", desc: "Pubs con historia, compras en Camden y el Big Ben. ¡Un clásico que nunca falla!" },
  { name: "Dublín", flag: "🇮🇪", image: "https://images.unsplash.com/photo-1540339832862-47452993c66e?auto=format&fit=crop&w=800", desc: "Cerveza negra en Temple Bar, música en vivo y la amabilidad irlandesa." },
  { name: "Roma", flag: "🇮🇹", image: "https://images.unsplash.com/photo-1552832230-c0197dd311b5?auto=format&fit=crop&w=800", desc: "Pasta, vino y mucha historia. La ciudad eterna nos espera con sus plazas." },
  { name: "Venecia", flag: "🇮🇹", image: "https://images.unsplash.com/photo-1514890547357-a9ee288728e0?auto=format&fit=crop&w=800", desc: "Canales mágicos y paseos en góndola. Septiembre es el mes perfecto por el clima." },
  { name: "Ámsterdam", flag: "🇳🇱", image: "https://images.unsplash.com/photo-1512470876302-972faa2aa9a4?auto=format&fit=crop&w=800", desc: "Paseos en bici, canales románticos y una atmósfera única en el mundo." },
  { name: "Budapest", flag: "🇭🇺", image: "https://images.unsplash.com/photo-1551867633-194f125bddfa?auto=format&fit=crop&w=800", desc: "Termas relajantes, el Parlamento iluminado y los mejores 'ruin pubs'." },
  { name: "Viena", flag: "🇦🇹", image: "https://images.unsplash.com/photo-1516550893923-42d28e5677af?auto=format&fit=crop&w=800", desc: "Elegancia imperial, cafés históricos y mucha tarta Sacher." },
  // 5 Ciudades baratas en septiembre
  { name: "Varsovia", flag: "🇵🇱", image: "https://images.unsplash.com/photo-1519197924294-4ba991a11128?auto=format&fit=crop&w=800", desc: "Moderna, barata y con un casco antiguo precioso. ¡Sorpresa garantizada!" },
  { name: "Praga", flag: "🇨🇿", image: "https://images.unsplash.com/photo-1513807016779-d51c0c026263?auto=format&fit=crop&w=800", desc: "La ciudad de las cien torres. Cerveza excelente y precios muy económicos." },
  { name: "Oporto", flag: "🇵🇹", image: "https://images.unsplash.com/photo-1555881400-74d7acaacd8b?auto=format&fit=crop&w=800", desc: "Vistas al Duero, azulejos azules y vino de Oporto. ¡Pura esencia lusa!" },
  { name: "Milán", flag: "🇮🇹", image: "https://images.unsplash.com/photo-1520986606214-8b456906c813?auto=format&fit=crop&w=800", desc: "Moda, el Duomo y aperitivos italianos. Vuelos muy competitivos en septiembre." },
  { name: "Bruselas", flag: "🇧🇪", image: "https://images.unsplash.com/photo-1559113513-d5e09c78b9dd?auto=format&fit=crop&w=800", desc: "Gofres, chocolate y la Grand Place. Un destino fácil y divertido para el grupo." }
];

function init() {
  const container = document.getElementById('chipsContainer');
  destinations.forEach(d => {
    const span = document.createElement('span');
    span.className = 'dest-chip';
    span.textContent = d.name;
    container.appendChild(span);
  });

  const planeContainer = document.getElementById('planes');
  for (let i = 0; i < 10; i++) {
    const el = document.createElement('div');
    el.className = 'plane-icon';
    el.textContent = '✈️';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (10 + Math.random() * 15) + 's';
    el.style.animationDelay = (Math.random() * 10) + 's';
    planeContainer.appendChild(el);
  }
}

let countdownTimer = null;
let currentCount = 5;
let selectedDest = null;

function startCountdown() {
  document.getElementById('btnSorteo').style.display = 'none';
  document.getElementById('chipsContainer').style.display = 'none';
  document.getElementById('countdownWrap').classList.add('active');

  selectedDest = destinations[Math.floor(Math.random() * destinations.length)];
  currentCount = 5;
  updateCountdown();
  animateChips();

  countdownTimer = setInterval(() => {
    currentCount--;
    updateCountdown();
    if (currentCount <= 0) {
      clearInterval(countdownTimer);
      showResult();
    }
  }, 1000);
}

function updateCountdown() {
  document.getElementById('countdownNum').textContent = currentCount;
  document.getElementById('progressFill').style.width = ((currentCount / 5) * 100) + '%';
}

function animateChips() {
  const chips = document.querySelectorAll('.dest-chip');
  let idx = 0;
  const chipInterval = setInterval(() => {
    if (currentCount <= 0) { clearInterval(chipInterval); return; }
    chips.forEach(c => c.classList.remove('highlight'));
    chips[idx % chips.length].classList.add('highlight');
    idx++;
  }, 150);
}

function showResult() {
  document.getElementById('countdownWrap').classList.remove('active');
  document.getElementById('cityImg').src = selectedDest.image;
  document.getElementById('cityFlag').textContent = selectedDest.flag;
  document.getElementById('cityName').textContent = selectedDest.name;
  document.getElementById('cityDesc').textContent = selectedDest.desc;
  document.getElementById('resultWrap').classList.add('active');
}

function reset() {
  document.getElementById('resultWrap').classList.remove('active');
  document.getElementById('chipsContainer').style.display = 'flex';
  document.getElementById('btnSorteo').style.display = 'block';
}

init();
</script>
</body>
</html>
